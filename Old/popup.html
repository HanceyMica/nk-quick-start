<!DOCTYPE html>

  <title>九宫格网址跳转</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="grid">
      <!-- 九宫格 -->
      <div class="grid-item" data-index="0">
        <img class="grid-icon favicon" src="" alt="favicon" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="grid-icon default-icon" style="display:flex;">1</div>
        <div class="grid-label">网站1</div>
      </div>

      </div>
      <div class="grid-item" data-index="5">

        <div class="grid-icon default-icon" style="display:flex;">9</div>
        <div class="grid-label">网站9</div>
      </div>
    </div>
    
    <!-- 按钮区域 -->
    <div class="button-container">
      <button id="settings-btn" class="btn">
        <span class="btn-icon">⚙️</span>
        <span>设置</span>
      </button>
